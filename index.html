<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>講義依存関係グラフ</title>
        <link rel="icon" type="image/png" href="img/favicon.png" />
        <link rel="apple-touch-icon" href="img/favicon.png" />
        <link rel="stylesheet" href="css/style.css" />
        <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
        <script
            type="text/javascript"
            src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"
        ></script>
    </head>
    <body>
        <div id="loadingMessage" class="loading">
            CSVデータを読み込み中です... しばらくお待ちください。
        </div>

        <header id="toolbar">
            <span class="toolbar-title">講義依存関係グラフ</span>
            <div class="toolbar-group">
                <select id="yearSelect"></select>
            </div>
            <div class="toolbar-group">
                <button id="allGraph" type="button">全体</button>
                <button id="connectedGraph" type="button">連結のみ</button>
            </div>
            <div class="toolbar-group search-box">
                <input
                    type="text"
                    id="classSearch"
                    placeholder="講義名・コード・教員で検索"
                    autocomplete="off"
                />
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="toolbar-group toolbar-class-select">
                <select id="classSelect">
                    <option value="">-- 講義を選択 --</option>
                </select>
            </div>
            <div class="toolbar-group">
                <label for="depthSelect">深さ</label>
                <select id="depthSelect">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="0">全</option>
                </select>
            </div>
        </header>

        <main>
            <div id="network"></div>
            <aside id="sidebar">
                <div class="table-container">
                    <table>
                        <tr>
                            <th>講義名称</th>
                            <td id="className">（講義をクリック）</td>
                        </tr>
                        <tr>
                            <th>講義コード</th>
                            <td id="classCode"></td>
                        </tr>
                        <tr>
                            <th>学則科目名称</th>
                            <td id="regulationSubjectName"></td>
                        </tr>
                        <tr>
                            <th>校地</th>
                            <td id="campus"></td>
                        </tr>
                        <tr>
                            <th>代表教員</th>
                            <td id="instructor"></td>
                        </tr>
                        <tr>
                            <th>科目群</th>
                            <td id="subjectGroup"></td>
                        </tr>
                        <tr>
                            <th>科目コード</th>
                            <td id="subjectCode"></td>
                        </tr>
                        <tr>
                            <th>授業実践言語</th>
                            <td id="language"></td>
                        </tr>
                        <tr>
                            <th>開講時期</th>
                            <td id="term"></td>
                        </tr>
                        <tr>
                            <th>シラバス</th>
                            <td><a id="syllabusUrl" target="_blank">開く</a></td>
                        </tr>
                    </table>
                </div>
                <details class="legend" open>
                    <summary class="legend-title">凡例</summary>
                    <div class="legend-content">
                        <div class="legend-section">
                            <div class="legend-subtitle">エッジ</div>
                            <div class="legend-item">
                                <span class="legend-edge edge-required"></span>
                                <span>required — 履修必須</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-edge edge-prerequisite"></span>
                                <span>prerequisite — 知識が前提</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-edge edge-recommended"></span>
                                <span>recommended — 推奨</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-edge edge-related"></span>
                                <span>related — 関連あり</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-edge edge-exclusive"></span>
                                <span>exclusive — 排他</span>
                            </div>
                        </div>
                        <div class="legend-section">
                            <div class="legend-subtitle">ノード（開講時期）</div>
                            <div id="nodeLegend"></div>
                        </div>
                    </div>
                </details>
            </aside>
        </main>
        <footer id="footer">
            <a href="licenses.html">ライセンス・免責事項</a>
        </footer>

        <script src="js/script.js"></script>
    </body>
</html>
